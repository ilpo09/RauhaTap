<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17364a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RauhaTap">
  <link rel="icon" href="rauhatap-circle-three-waves-small-cutout.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">

  <title>RauhaTap</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #17364a;
    }

    body {
      min-height: 100dvh;
      font-family: Inter, ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
      color: white;
      background: linear-gradient(135deg, #142f43, #3a7280, #70aaa0);
      background-size: 300% 300%;
      animation: calmBackground 18s ease-in-out infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 82% 78%, rgba(255,236,204,0.1), transparent 30%),
        radial-gradient(circle at center, transparent 42%, rgba(0,0,0,0.24) 100%);
      z-index: 1;
    }

    .ambient {
      position: fixed;
      border-radius: 999px;
      filter: blur(90px);
      opacity: var(--ambient-opacity, 0.22);
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: 0;
      transform: translate(var(--move-x, 0px), var(--move-y, 0px));
    }

    .ambient1 {
      width: 420px;
      height: 420px;
      background: #8fd3ff;
      --ambient-opacity: 0.22;
      --pulse-peak-opacity: 0.28;
      top: -120px;
      left: -100px;
      animation: floatOne 26s ease-in-out infinite alternate;
    }

    .ambient2 {
      width: 380px;
      height: 380px;
      background: #9effd6;
      --ambient-opacity: 0.22;
      --pulse-peak-opacity: 0.27;
      bottom: -140px;
      right: -120px;
      animation: floatTwo 32s ease-in-out infinite alternate;
    }

    .ambient3 {
      width: 300px;
      height: 300px;
      background: #ffffff;
      top: 40%;
      left: 50%;
      --ambient-opacity: 0.08;
      --pulse-peak-opacity: 0.12;
      animation: pulseGlow 18s ease-in-out infinite;
    }

    .app {
      width: min(90vw, 480px);
      min-height: 100dvh;
      padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
      text-align: center;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .menuButton {
      position: fixed;
      top: max(18px, env(safe-area-inset-top));
      left: 18px;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      z-index: 5;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 14px 34px rgba(0,0,0,0.14),
        inset 0 1px 1px rgba(255,255,255,0.12);
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        border-color 0.18s ease;
    }

    .menuButton span {
      width: 3px;
      height: 17px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
    }

    .menuButton:active {
      transform: scale(0.94);
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.24);
    }

    .brandLogo {
      position: fixed;
      top: max(18px, env(safe-area-inset-top));
      left: 74px;
      height: 46px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 3px;
      color: white;
      font-size: 1.55rem;
      font-weight: 720;
      line-height: 1;
      letter-spacing: 0;
      text-decoration: none;
      text-shadow: 0 8px 22px rgba(0,0,0,0.16);
      pointer-events: none;
      animation: logoReveal 0.75s ease-out both;
    }

    .brandMark {
      width: 46px;
      height: 46px;
      display: block;
      flex: 0 0 auto;
      overflow: visible;
      color: #143447;
    }

    .card {
      position: relative;
      width: 100%;
      height: 320px;
      padding: 42px;
      border-radius: 38px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.09)),
        rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.24);
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      overflow: hidden;
      backdrop-filter: blur(30px) saturate(1.12);
      -webkit-backdrop-filter: blur(30px) saturate(1.12);
      box-shadow:
        0 28px 76px rgba(0,0,0,0.22),
        inset 0 1px 1px rgba(255,255,255,0.18),
        inset 0 -32px 70px rgba(18,56,70,0.12);
      animation:
        breathe 14s ease-in-out infinite,
        floatCard 20s ease-in-out infinite alternate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 0 52px rgba(185,245,236,0.1),
        inset 0 0 42px rgba(255,255,255,0.06);
      pointer-events: none;
      animation: breatheHalo 7s ease-in-out infinite;
    }

    .card::after {
      content: "";
      position: absolute;
      top: -38%;
      left: -54%;
      width: 58%;
      height: 176%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: rotate(18deg);
      pointer-events: none;
      animation: glassShimmer 11s ease-in-out infinite;
    }

    #message {
      margin: 0;
      color: white !important;
      -webkit-text-fill-color: white;
      opacity: 1 !important;
      font-size: clamp(1.9rem, 7vw, 2.55rem);
      font-weight: 650;
      line-height: 1.35;
      letter-spacing: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      text-align: center;
      transition:
        opacity 0.45s ease,
        transform 0.45s ease;
      text-wrap: balance;
      text-shadow: 0 2px 24px rgba(0,0,0,0.16);
      z-index: 1;
    }

    .fadeOut {
      opacity: 0 !important;
      transform: translateY(6px);
    }

    .fadeIn {
      opacity: 1 !important;
      transform: translateY(0);
    }

    .arrowButton {
      position: relative;
      margin-top: 32px;
      margin-left: auto;
      margin-right: auto;
      width: 76px;
      height: 76px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.24);
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.26), transparent 34%),
        rgba(255,255,255,0.1);
      color: white;
      font-size: 2.15rem;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        border-color 0.18s ease,
        opacity 0.18s ease;
      box-shadow:
        0 16px 38px rgba(0,0,0,0.18),
        0 0 36px rgba(169,236,226,0.08),
        inset 0 1px 1px rgba(255,255,255,0.18),
        inset 0 -18px 38px rgba(22,75,88,0.12);
      animation: floatArrow 5s ease-in-out infinite alternate;
    }

    .arrowButton::before,
    .arrowButton::after {
      content: "";
      position: absolute;
      inset: -9px;
      border-radius: 999px;
      border: 1px solid rgba(220,255,248,0.18);
      pointer-events: none;
      animation: arrowBreath 4.8s ease-in-out infinite;
    }

    .arrowButton::after {
      inset: -18px;
      opacity: 0;
      animation-delay: 1.2s;
    }

    .arrowButton:active {
      transform: scale(0.94);
      opacity: 0.82;
      border-color: rgba(255,255,255,0.32);
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.32), transparent 34%),
        rgba(255,255,255,0.16);
    }

    .arrowButton.ripple::after {
      animation: calmRipple 680ms ease-out;
    }

    .progressDots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 18px;
      margin-top: 22px;
    }

    .progressDot {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
      box-shadow: 0 0 12px rgba(255,255,255,0);
      transition:
        width 0.35s ease,
        background 0.35s ease,
        box-shadow 0.35s ease;
    }

    .progressDot.active {
      width: 18px;
      background: rgba(255,255,255,0.82);
      box-shadow: 0 0 18px rgba(210,255,246,0.22);
    }

    .infoOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: calc(max(18px, env(safe-area-inset-top)) + 58px) 18px 18px;
      box-sizing: border-box;
      background: rgba(10, 30, 40, 0);
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      transition:
        opacity 0.22s ease,
        background 0.22s ease;
    }

    .infoOverlay.open {
      opacity: 1;
      pointer-events: auto;
      background: rgba(10, 30, 40, 0.18);
    }

    .infoPanel {
      width: min(82vw, 320px);
      padding: 20px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.92);
      text-align: left;
      line-height: 1.45;
      font-size: 0.98rem;
      font-weight: 500;
      backdrop-filter: blur(24px) saturate(1.12);
      -webkit-backdrop-filter: blur(24px) saturate(1.12);
      box-shadow:
        0 22px 60px rgba(0,0,0,0.2),
        inset 0 1px 1px rgba(255,255,255,0.16);
      transform: translateY(-8px);
      transition: transform 0.22s ease;
    }

    .infoOverlay.open .infoPanel {
      transform: translateY(0);
    }

    @keyframes calmBackground {
      from { background-position: 0% 50%; }
      to { background-position: 100% 50%; }
    }

    @keyframes breathe {
      0% { transform: scale(0.98); }
      35% { transform: scale(1.03); }
      100% { transform: scale(0.98); }
    }

    @keyframes breatheHalo {
      0%, 100% {
        opacity: 0.34;
        transform: scale(0.98);
      }

      50% {
        opacity: 0.74;
        transform: scale(1.015);
      }
    }

    @keyframes floatCard {
      from { transform: translateY(0) scale(0.98); }
      to { transform: translateY(-10px) scale(1.03); }
    }

    @keyframes floatArrow {
      from { translate: 0 0; }
      to { translate: 0 -4px; }
    }

    @keyframes arrowBreath {
      0%, 100% {
        opacity: 0.18;
        transform: scale(0.96);
      }

      50% {
        opacity: 0.34;
        transform: scale(1.06);
      }
    }

    @keyframes calmRipple {
      0% {
        opacity: 0.36;
        transform: scale(0.86);
      }

      100% {
        opacity: 0;
        transform: scale(1.48);
      }
    }

    @keyframes glassShimmer {
      0%, 64% {
        opacity: 0;
        transform: translateX(0) rotate(18deg);
      }

      76% {
        opacity: 0.75;
      }

      100% {
        opacity: 0;
        transform: translateX(340%) rotate(18deg);
      }
    }

    @keyframes logoReveal {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 0.92;
        transform: translateY(0);
      }
    }

    @keyframes floatOne {
      from { translate: 0 0; scale: 1; }
      to { translate: 60px 90px; scale: 1.18; }
    }

    @keyframes floatTwo {
      from { translate: 0 0; scale: 1; }
      to { translate: -70px -60px; scale: 1.12; }
    }

    @keyframes pulseGlow {
      0% {
        transform: translate(-50%, -50%) scale(0.92);
        opacity: 0.05;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.08);
        opacity: 0.12;
      }

      100% {
        transform: translate(-50%, -50%) scale(0.92);
        opacity: 0.05;
      }
    }
body.pulse .ambient1 {
  animation:
    floatOne 26s ease-in-out infinite alternate,
    auroraPulse 900ms ease-out;
}

body.pulse .ambient2 {
  animation:
    floatTwo 32s ease-in-out infinite alternate,
    auroraPulse 1100ms ease-out;
}

body.pulse .ambient3 {
  animation:
    pulseGlow 18s ease-in-out infinite,
    auroraPulse 1200ms ease-out;
}

@keyframes auroraPulse {
  0% {
    opacity: var(--ambient-opacity, 0.22);
    filter: blur(90px);
  }

  45% {
    opacity: var(--pulse-peak-opacity, 0.28);
    filter: blur(96px);
  }

  100% {
    opacity: var(--ambient-opacity, 0.22);
    filter: blur(90px);
  }
}

    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #102636, #2e6170, #547f7b);
      }

      body::after {
        background:
          radial-gradient(circle at 82% 78%, rgba(255,236,204,0.08), transparent 30%),
          radial-gradient(circle at center, transparent 36%, rgba(0,0,0,0.34) 100%);
      }

      .ambient1,
      .ambient2 {
        --ambient-opacity: 0.17;
      }

      .card {
        background:
          linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.07)),
          rgba(255,255,255,0.1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body,
      .ambient,
      .card,
      .card::before,
      .card::after,
      .arrowButton,
      .arrowButton::before,
      .arrowButton::after,
      .brandLogo {
        animation: none !important;
      }
    }

    @media (max-width: 420px) {
      .app {
        width: min(91vw, 480px);
        padding-left: 18px;
        padding-right: 18px;
      }

      .card {
        height: 300px;
        padding: 34px 28px;
        border-radius: 32px;
      }

      .card::before {
        border-radius: 24px;
      }

      #message {
        font-size: clamp(1.7rem, 8vw, 2.28rem);
      }

      .brandLogo {
        height: 46px;
        left: 72px;
        font-size: 1.42rem;
      }
    }
  </style>
</head>

<body>
  <div class="ambient ambient1"></div>
  <div class="ambient ambient2"></div>
  <div class="ambient ambient3"></div>

  <button id="menuButton" class="menuButton" aria-label="Lisätiedot" aria-expanded="false" aria-controls="infoOverlay">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <div class="brandLogo" aria-label="RauhaTap">
    <img class="brandMark" src="rauhatap-circle-three-waves-small-cutout.svg" alt="">
    <span>RauhaTap</span>
  </div>

  <div id="infoOverlay" class="infoOverlay" aria-hidden="true">
    <div class="infoPanel" role="dialog" aria-modal="false" aria-label="Aloitusnäytölle tallentaminen">
      Voit tallentaa tämän aloitusnäytölle, jotta Apukortti on nopeasti saatavilla myös ilman nettiä.
    </div>
  </div>

  <main class="app">
    <section class="card">
      <p id="message">Tämä on paniikkikohtaus. Se menee ohi.</p>
    </section>

    <button id="nextButton" class="arrowButton" aria-label="Seuraava teksti">→</button>
    <div id="progressDots" class="progressDots" aria-hidden="true"></div>
  </main>

  <script>
    const messages = [
      "Tämä on paniikkikohtaus. Se menee ohi.",
      "Olet turvassa juuri nyt.",
      "Hengitä rauhassa sisään.",
      "Puhalla hitaasti ulos.",
      "Katso ympärillesi ja nimeä yksi asia, jonka näet.",
      "Tunne jalkasi lattiaa vasten.",
      "Tämä tunne menee ohi.",
      "Sinun ei tarvitse ratkaista mitään juuri nyt.",
      "Ota seuraava pieni hengitys.",
      "Keskity vain tähän hetkeen.",
      "Hyvä. Jatka rauhallisesti."
    ];

    let index = 0;

    const message = document.getElementById("message");
    const button = document.getElementById("nextButton");
    const ambientElements = document.querySelectorAll(".ambient");
    const dotsContainer = document.getElementById("progressDots");
    const menuButton = document.getElementById("menuButton");
    const infoOverlay = document.getElementById("infoOverlay");

    messages.forEach((_, dotIndex) => {
      const dot = document.createElement("span");
      dot.className = dotIndex === index ? "progressDot active" : "progressDot";
      dotsContainer.appendChild(dot);
    });

    const updateProgress = () => {
      dotsContainer.querySelectorAll(".progressDot").forEach((dot, dotIndex) => {
        dot.classList.toggle("active", dotIndex === index);
      });
    };

    const closeInfo = () => {
      infoOverlay.classList.remove("open");
      infoOverlay.setAttribute("aria-hidden", "true");
      menuButton.setAttribute("aria-expanded", "false");
    };

    menuButton.addEventListener("click", () => {
      const isOpen = infoOverlay.classList.toggle("open");
      infoOverlay.setAttribute("aria-hidden", String(!isOpen));
      menuButton.setAttribute("aria-expanded", String(isOpen));
    });

    infoOverlay.addEventListener("click", (event) => {
      if (event.target === infoOverlay) {
        closeInfo();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeInfo();
      }
    });

    button.addEventListener("click", () => {
document.body.classList.remove("pulse");
button.classList.remove("ripple");

void document.body.offsetWidth;

document.body.classList.add("pulse");
button.classList.add("ripple");

setTimeout(() => {
  document.body.classList.remove("pulse");
  button.classList.remove("ripple");
}, 1200);
if ("vibrate" in navigator) {
  navigator.vibrate(20);
}
      message.classList.remove("fadeIn");
      message.classList.add("fadeOut");

      setTimeout(() => {
        index = (index + 1) % messages.length;
        message.textContent = messages[index];
        updateProgress();

        message.classList.remove("fadeOut");

        requestAnimationFrame(() => {
          message.classList.add("fadeIn");
        });
      }, 280);
    });

    window.addEventListener("pointermove", (event) => {
      const x = (event.clientX / window.innerWidth - 0.5) * 14;
      const y = (event.clientY / window.innerHeight - 0.5) * 14;

      ambientElements.forEach((el, i) => {
        const strength = (i + 1) * 0.35;
        el.style.setProperty("--move-x", `${x * strength}px`);
        el.style.setProperty("--move-y", `${y * strength}px`);
      });
    });
  </script>
</body>
</html>
