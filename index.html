<!DOCTYPE html>
<html lang="fi" style="background-color:#203b42;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#203b42">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Valwen">
  <link rel="manifest" href="manifest.json">

  <title>Valwen</title>

  <script>
    (() => {
      try {
        const savedTheme = localStorage.getItem("valwen-theme") || localStorage.getItem("rauhatap-theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? "night" : "day");
      } catch (error) {
        document.documentElement.dataset.theme = "night";
      }
    })();
  </script>

  <style>
    html {
      height: 100%;
      min-height: 100%;
      min-height: -webkit-fill-available;
      background-color: #203b42;
      background:
        url("data:image/svg+xml,%3Csvg width='180' height='180' viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.28' numOctaves='4' seed='43' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='180' height='180' filter='url(%23grain)' opacity='0.34'/%3E%3C/svg%3E"),
        radial-gradient(ellipse at 50% 108%, rgba(32,59,66,0), rgba(32,59,66,0.18) 46%, #203b42 92%),
        radial-gradient(ellipse at 50% 46%, rgba(190,221,207,0.46), rgba(118,170,163,0.3) 36%, rgba(82,113,125,0.2) 64%, transparent 88%),
        linear-gradient(180deg, #243947 0%, #5b7876 48%, #4a6c70 74%, #203b42 100%);
      background-size: 180px 180px, 150% 92%, 150% 132%, 100% 100%;
      background-position: center, center bottom, center, center;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      min-height: -webkit-fill-available;
      min-height: 100svh;
      min-height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      background-color: #203b42;
    }

    html[data-theme="day"] {
      background-color: #365e64;
      background:
        url("data:image/svg+xml,%3Csvg width='180' height='180' viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.28' numOctaves='4' seed='43' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='180' height='180' filter='url(%23grain)' opacity='0.28'/%3E%3C/svg%3E"),
        radial-gradient(ellipse at 50% 108%, rgba(54,94,100,0), rgba(54,94,100,0.18) 46%, #365e64 92%),
        radial-gradient(ellipse at 50% 46%, rgba(247,255,251,0.24), rgba(184,225,214,0.2) 36%, rgba(92,137,148,0.18) 66%, transparent 88%),
        linear-gradient(180deg, #54787e 0%, #7fa095 50%, #6d8f8a 75%, #365e64 100%);
    }

    html[data-theme="night"] {
      background-color: #172f3a;
      background:
        url("data:image/svg+xml,%3Csvg width='180' height='180' viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.28' numOctaves='4' seed='43' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='180' height='180' filter='url(%23grain)' opacity='0.36'/%3E%3C/svg%3E"),
        radial-gradient(ellipse at 50% 108%, rgba(23,47,58,0), rgba(23,47,58,0.22) 46%, #172f3a 92%),
        radial-gradient(ellipse at 50% 46%, rgba(159,218,202,0.4), rgba(75,137,143,0.32) 36%, rgba(28,64,77,0.2) 66%, transparent 88%),
        linear-gradient(180deg, #162a36 0%, #395f66 50%, #2b5360 76%, #172f3a 100%);
    }

    html,
    html[data-theme="day"],
    html[data-theme="night"] {
      background-size: 180px 180px, 150% 92%, 150% 132%, 100% 100%;
      background-position: center, center bottom, center, center;
    }

    body {
      position: fixed;
      inset: 0;
      height: 100%;
      min-height: 100%;
      min-height: -webkit-fill-available;
      min-height: 100svh;
      min-height: 100dvh;
      overflow: hidden;
      font-family: Inter, "SF Pro Display", "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      color: white;
      background: inherit;
      background-color: #203b42;
      --shell-color: #203b42;
      --theme-base: linear-gradient(180deg, #243947 0%, #5b7876 48%, #4a6c70 74%, #203b42 100%);
      --theme-center: radial-gradient(circle at 50% 50%, rgba(190,221,207,0.5), rgba(118,170,163,0.32) 34%, rgba(82,113,125,0.16) 58%, transparent 76%);
      --theme-floor: radial-gradient(ellipse at 50% 108%, rgba(32,59,66,0), rgba(32,59,66,0.18) 46%, #203b42 92%);
      --theme-glow: radial-gradient(circle at 50% 52%, rgba(230,239,213,0.16), transparent 43%);
      --theme-vignette: radial-gradient(circle at center, transparent 31%, rgba(37,63,73,0.26) 62%, rgba(15,28,36,0.52) 100%);
      --grain-opacity: 0.26;
      --grain-shift-x: 0px;
      --grain-shift-y: 0px;
      --grain-center-x: 50%;
      --grain-center-y: 50%;
      --ring-scale: 1;
      --ring-x: 50%;
      --ring-y: 50%;
      --edge-top-rgb: 32, 59, 66;
      --edge-bottom-rgb: 32, 59, 66;
      letter-spacing: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -180px 0 -520px;
      pointer-events: none;
      background:
        var(--theme-glow),
        var(--theme-center),
        var(--theme-floor),
        var(--theme-base);
      background-position: center;
      background-size: 140% 140%, 100% 100%, 145% 92%, 100% 100%;
      animation: calmBackground 90s ease-in-out infinite alternate;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: -180px 0 -520px;
      pointer-events: none;
      background:
        url("data:image/svg+xml,%3Csvg width='180' height='180' viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.28' numOctaves='4' seed='43' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='180' height='180' filter='url(%23grain)' opacity='0.96'/%3E%3C/svg%3E"),
        radial-gradient(circle at 50% 46%, rgba(255,255,255,0.06), transparent 58%);
      background-size: 180px 180px, 100% 100%;
      mix-blend-mode: soft-light;
      opacity: 0.48;
      z-index: 3;
      animation: pageGrainDrift 1.4s steps(2, end) infinite;
    }

    .flowCanvas {
      position: fixed;
      top: -180px;
      right: 0;
      bottom: -520px;
      left: 0;
      width: 100vw;
      height: calc(100% + 700px);
      pointer-events: none;
      opacity: 0.92;
      mix-blend-mode: screen;
      z-index: 1;
    }

    .pageVignette {
      content: "";
      position: fixed;
      inset: -180px 0 -520px;
      pointer-events: none;
      background:
        radial-gradient(circle at 82% 78%, rgba(255,236,204,0.1), transparent 30%),
        var(--theme-vignette);
      z-index: 1;
    }

    .edgeFade {
      position: fixed;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 1;
    }

    .edgeFadeTop {
      top: -1px;
      height: calc(env(safe-area-inset-top) + 168px);
      min-height: 168px;
      background: linear-gradient(
        180deg,
        rgba(var(--edge-top-rgb), 0.92) 0%,
        rgba(var(--edge-top-rgb), 0.62) 42%,
        rgba(var(--edge-top-rgb), 0) 100%
      );
    }

    .edgeFadeBottom {
      bottom: -1px;
      height: calc(env(safe-area-inset-bottom) + 220px);
      min-height: 220px;
      background: linear-gradient(
        0deg,
        rgba(var(--edge-bottom-rgb), 0.94) 0%,
        rgba(var(--edge-bottom-rgb), 0.64) 45%,
        rgba(var(--edge-bottom-rgb), 0) 100%
      );
    }

    body[data-theme="day"] {
      --shell-color: #365e64;
      --theme-base: linear-gradient(180deg, #54787e 0%, #7fa095 50%, #6d8f8a 75%, #365e64 100%);
      --theme-center: radial-gradient(circle at 50% 50%, rgba(247,255,251,0.25), rgba(184,225,214,0.2) 34%, rgba(92,137,148,0.15) 61%, transparent 80%);
      --theme-floor: radial-gradient(ellipse at 50% 108%, rgba(54,94,100,0), rgba(54,94,100,0.18) 46%, #365e64 92%);
      --theme-glow: radial-gradient(circle at 50% 52%, rgba(255,255,250,0.105), transparent 46%);
      --theme-vignette: radial-gradient(circle at center, transparent 28%, rgba(54,91,101,0.34) 64%, rgba(25,54,66,0.62) 100%);
      --grain-opacity: 0.23;
      --edge-top-rgb: 54, 94, 100;
      --edge-bottom-rgb: 54, 94, 100;
    }

    body[data-theme="night"] {
      --shell-color: #172f3a;
      --theme-base: linear-gradient(180deg, #162a36 0%, #395f66 50%, #2b5360 76%, #172f3a 100%);
      --theme-center: radial-gradient(circle at 50% 50%, rgba(159,218,202,0.42), rgba(75,137,143,0.34) 35%, rgba(28,64,77,0.18) 60%, transparent 78%);
      --theme-floor: radial-gradient(ellipse at 50% 108%, rgba(23,47,58,0), rgba(23,47,58,0.22) 46%, #172f3a 92%);
      --theme-glow: radial-gradient(circle at 50% 52%, rgba(182,229,213,0.16), transparent 43%);
      --theme-vignette: radial-gradient(circle at center, transparent 30%, rgba(12,38,50,0.32) 62%, rgba(4,15,23,0.62) 100%);
      --grain-opacity: 0.3;
      --edge-top-rgb: 23, 47, 58;
      --edge-bottom-rgb: 23, 47, 58;
    }

    .ambient {
      position: fixed;
      border-radius: 999px;
      filter: blur(90px);
      opacity: var(--ambient-opacity, 0.22);
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: 0;
      transform: translate(var(--move-x, 0px), var(--move-y, 0px));
    }

    .ambient1 {
      width: 420px;
      height: 420px;
      background: #8fd3ff;
      --ambient-opacity: 0.22;
      --pulse-peak-opacity: 0.24;
      top: -120px;
      left: -100px;
      animation: floatOne 26s ease-in-out infinite alternate;
    }

    .ambient2 {
      width: 380px;
      height: 380px;
      background: #9effd6;
      --ambient-opacity: 0.22;
      --pulse-peak-opacity: 0.235;
      bottom: -140px;
      right: -120px;
      animation: floatTwo 32s ease-in-out infinite alternate;
    }

    .ambient3 {
      width: 300px;
      height: 300px;
      background: #ffffff;
      top: 40%;
      left: 50%;
      --ambient-opacity: 0.08;
      --pulse-peak-opacity: 0.105;
      animation: pulseGlow 18s ease-in-out infinite;
    }

    .app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: 0;
      min-height: 100svh;
      min-height: 100dvh;
      padding: calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 30px);
      text-align: center;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .cardFilmGlow {
      display: none;
    }

    .card,
    .arrowButton,
    .progressDots {
      z-index: 1;
    }

    .menuButton {
      position: fixed;
      top: max(18px, env(safe-area-inset-top));
      left: 18px;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      z-index: 5;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 14px 34px rgba(0,0,0,0.14),
        inset 0 1px 1px rgba(255,255,255,0.12);
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        border-color 0.18s ease;
    }

    .menuButton span {
      width: 17px;
      height: 2px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
    }

    .menuButton:active {
      transform: scale(0.94);
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.24);
    }

    .brandLogo {
      position: fixed;
      top: max(18px, env(safe-area-inset-top));
      left: 78px;
      height: 46px;
      z-index: 5;
      display: flex;
      align-items: center;
      color: white;
      font-size: 1.48rem;
      font-weight: 680;
      line-height: 1;
      letter-spacing: 0;
      text-decoration: none;
      text-shadow: 0 8px 22px rgba(0,0,0,0.16);
      pointer-events: none;
      animation: logoReveal 0.75s ease-out both;
    }

    .card {
      position: relative;
      width: min(82vw, 392px);
      aspect-ratio: 1;
      min-height: 300px;
      padding: 48px;
      border-radius: 32px;
      background: transparent;
      border: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      overflow: visible;
      box-shadow: none;
      animation: none;
    }

    .card::before {
      display: none;
    }

    .card::after {
      display: none;
    }

    #message {
      margin: 0;
      color: white !important;
      -webkit-text-fill-color: white;
      opacity: 1 !important;
      font-size: clamp(1.66rem, 5.7vw, 2.22rem);
      font-weight: 610;
      line-height: 1.42;
      letter-spacing: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 12.8em;
      height: 100%;
      text-align: center;
      font-variation-settings: "wght" 610;
      transition:
        opacity 0.34s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.34s cubic-bezier(0.22, 1, 0.36, 1);
      text-wrap: balance;
      text-shadow:
        0 2px 22px rgba(0,0,0,0.18),
        0 0 42px rgba(220,255,243,0.07);
      z-index: 1;
    }

    body[data-theme="day"] #message {
      text-shadow:
        0 2px 8px rgba(18,44,52,0.22),
        0 8px 28px rgba(18,44,52,0.2),
        0 0 36px rgba(220,255,245,0.08);
    }

    .fadeOut {
      opacity: 0 !important;
      transform: translateY(8px) scale(0.996);
    }

    .fadeIn {
      opacity: 1 !important;
      transform: translateY(0) scale(1);
    }

    .arrowButton {
      position: relative;
      margin: 0;
      width: 84px;
      height: 84px;
      border-radius: 999px;
      border: 1px solid rgba(226,255,249,0.34);
      background:
        radial-gradient(circle at 50% 22%, rgba(255,255,255,0.38), transparent 34%),
        radial-gradient(circle at 50% 58%, rgba(146,238,224,0.16), transparent 62%),
        rgba(255,255,255,0.12);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition:
        transform 0.32s cubic-bezier(0.22, 1, 0.36, 1),
        background 0.32s ease,
        border-color 0.32s ease,
        opacity 0.32s ease,
        filter 0.32s ease;
      box-shadow:
        0 20px 46px rgba(0,0,0,0.2),
        0 0 54px rgba(169,236,226,0.14),
        inset 0 1px 1px rgba(255,255,255,0.26),
        inset 0 -22px 42px rgba(22,75,88,0.14);
      animation: floatArrow 5s ease-in-out infinite alternate;
    }

    .arrowIcon {
      position: relative;
      display: block;
      width: 31px;
      height: 24px;
      color: currentColor;
    }

    .arrowIcon::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 2px;
      width: 27px;
      height: 3px;
      border-radius: 999px;
      background: currentColor;
      transform: translateY(-50%);
    }

    .arrowIcon::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 2px;
      width: 12px;
      height: 12px;
      border-top: 3px solid currentColor;
      border-right: 3px solid currentColor;
      border-radius: 1px;
      transform: translateY(-50%) rotate(45deg);
      transform-origin: center;
    }

    .arrowIcon.left::after {
      right: auto;
      left: 2px;
      transform: translateY(-50%) rotate(225deg);
    }

    .navControls {
      display: grid;
      grid-template-columns: 50px 84px 50px;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 34px;
      width: 100%;
    }

    .prevButton {
      width: 50px;
      height: 50px;
      border-color: rgba(255,255,255,0.12);
      background:
        radial-gradient(circle at 50% 24%, rgba(255,255,255,0.12), transparent 38%),
        rgba(255,255,255,0.045);
      color: rgba(255,255,255,0.68);
      box-shadow:
        0 10px 24px rgba(0,0,0,0.1),
        inset 0 1px 1px rgba(255,255,255,0.1),
        inset 0 -12px 24px rgba(22,75,88,0.06);
      animation: none;
    }

    .prevButton .arrowIcon {
      width: 24px;
      height: 20px;
    }

    .prevButton .arrowIcon::before {
      left: 3px;
      width: 18px;
      height: 2.4px;
    }

    .prevButton .arrowIcon::after {
      left: 3px;
      width: 9px;
      height: 9px;
      border-top-width: 2.4px;
      border-right-width: 2.4px;
    }

    .prevButton:active {
      color: rgba(255,255,255,0.86);
      border-color: rgba(255,255,255,0.18);
      background:
        radial-gradient(circle at 50% 24%, rgba(255,255,255,0.16), transparent 38%),
        rgba(255,255,255,0.075);
    }

    .controlSpacer {
      width: 50px;
      height: 50px;
    }

    .prevButton::before,
    .prevButton::after {
      display: none;
      animation: none;
    }

    .arrowButton::before,
    .arrowButton::after {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 999px;
      border: 1px solid rgba(220,255,248,0.2);
      pointer-events: none;
      animation: arrowBreath 4.8s ease-in-out infinite;
    }

    .arrowButton::after {
      inset: -22px;
      opacity: 0;
      animation-delay: 1.2s;
    }

    .arrowButton:active {
      transform: scale(0.975);
      opacity: 0.9;
      border-color: rgba(255,255,255,0.32);
      background:
        radial-gradient(circle at 50% 22%, rgba(255,255,255,0.42), transparent 34%),
        radial-gradient(circle at 50% 58%, rgba(146,238,224,0.22), transparent 62%),
        rgba(255,255,255,0.17);
    }

    .arrowButton.ripple::after {
      animation: calmRipple 1080ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .arrowButton:disabled {
      cursor: default;
      opacity: 0.64;
      filter: saturate(0.88);
      transform: scale(0.985);
    }

    .progressDots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 18px;
      margin-top: 22px;
    }

    .progressDot {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
      box-shadow: 0 0 12px rgba(255,255,255,0);
      transition:
        width 0.35s ease,
        background 0.35s ease,
        box-shadow 0.35s ease;
    }

    .progressDot.active {
      width: 18px;
      background: rgba(255,255,255,0.82);
      box-shadow: 0 0 18px rgba(210,255,246,0.22);
    }

    body.finalCard .progressDot.active {
      background: rgba(222,255,246,0.9);
      box-shadow:
        0 0 18px rgba(205,255,238,0.2),
        0 0 34px rgba(180,238,218,0.14);
    }

    body.finalCard #nextButton {
      border-color: rgba(226,255,249,0.42);
      background:
        radial-gradient(circle at 50% 22%, rgba(255,255,255,0.42), transparent 34%),
        radial-gradient(circle at 50% 58%, rgba(176,246,224,0.18), transparent 62%),
        rgba(255,255,255,0.13);
    }

    .infoOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: calc(max(18px, env(safe-area-inset-top)) + 58px) 18px 18px;
      box-sizing: border-box;
      background: rgba(10, 30, 40, 0);
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      transition:
        opacity 0.22s ease,
        background 0.22s ease;
    }

    .infoOverlay.open {
      opacity: 1;
      pointer-events: auto;
      background: rgba(10, 30, 40, 0.18);
    }

    .infoPanel {
      width: min(82vw, 320px);
      padding: 20px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.92);
      text-align: left;
      line-height: 1.45;
      font-size: 0.98rem;
      font-weight: 500;
      backdrop-filter: blur(24px) saturate(1.12);
      -webkit-backdrop-filter: blur(24px) saturate(1.12);
      box-shadow:
        0 22px 60px rgba(0,0,0,0.2),
        inset 0 1px 1px rgba(255,255,255,0.16);

    @keyframes sandBreath {

          calc(50% + var(--grain-shift-x) + 1px) calc(50% + var(--grain-shift-y) - 3px),
          calc(50% - var(--grain-shift-x) - 2px) calc(50% - var(--grain-shift-y) + 4px),
          var(--ring-x) var(--ring-y);
        background-size: 120px 120px, 13px 13px, 19px 19px, 96% 96%;
        transform: translate3d(var(--grain-shift-x), var(--grain-shift-y), 0) scale(0.996);
        filter: contrast(1.08) brightness(1.02);
      }

      50% {
        opacity: var(--grain-opacity);
        background-position:
          calc(50% + var(--grain-shift-x) + 6px) calc(50% + var(--grain-shift-y) - 4px),
          calc(50% + var(--grain-shift-x) - 3px) calc(50% + var(--grain-shift-y) + 4px),
          calc(50% - var(--grain-shift-x) + 4px) calc(50% - var(--grain-shift-y) - 2px),
          var(--ring-x) var(--ring-y);
        background-size: 120px 120px, 14px 14px, 20px 20px, 106% 106%;
        transform: translate3d(var(--grain-shift-x), var(--grain-shift-y), 0) scale(1.012);
        filter: contrast(1.2) brightness(1.12);
      }

      100% {
        opacity: calc(var(--grain-opacity) * 0.74);
        background-position:
          calc(50% + var(--grain-shift-x) - 5px) calc(50% + var(--grain-shift-y) + 2px),
          calc(50% + var(--grain-shift-x) + 1px) calc(50% + var(--grain-shift-y) - 3px),
          calc(50% - var(--grain-shift-x) - 2px) calc(50% - var(--grain-shift-y) + 4px),
          var(--ring-x) var(--ring-y);

    @keyframes breathe {

body.pulse .ambient1 {
  animation:
    floatOne 26s ease-in-out infinite alternate,
    auroraPulse 1400ms cubic-bezier(0.22, 1, 0.36, 1);
}

body.pulse .ambient2 {
  animation:
    floatTwo 32s ease-in-out infinite alternate,
    auroraPulse 1600ms cubic-bezier(0.22, 1, 0.36, 1);
}

body.pulse .ambient3 {
  animation:
    pulseGlow 18s ease-in-out infinite,
    auroraPulse 1800ms cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes auroraPulse {
  0% {
    opacity: var(--ambient-opacity, 0.22);
    filter: blur(90px);
  }

  45% {
    opacity: var(--pulse-peak-opacity, 0.24);
    filter: blur(102px);
  }

  100% {
    opacity: var(--ambient-opacity, 0.22);
    filter: blur(90px);
  }
}

    @media (prefers-color-scheme: dark) {

    <div class="navControls" aria-label="Korttien selaus">
      <button id="prevButton" class="arrowButton prevButton" aria-label="Edellinen teksti">
        <span class="arrowIcon left" aria-hidden="true"></span>
      </button>
      <button id="nextButton" class="arrowButton" aria-label="Seuraava teksti">
        <span class="arrowIcon" aria-hidden="true"></span>
      </button>
      <span class="controlSpacer" aria-hidden="true"></span>
    </div>
    <div id="progressDots" class="progressDots" aria-hidden="true"></div>
  </main>

  <script>
    const defaultMessages = [
      "Tämä on paniikkikohtaus. Se menee ohi.",
      "Olet turvassa juuri nyt.",
      "Hengitä rauhassa sisään.",
      "Puhalla hitaasti ulos.",
      "Katso ympärillesi ja nimeä yksi asia, jonka näet.",
      "Tunne jalkasi lattiaa vasten.",
      "Tämä tunne menee ohi.",
      "Sinun ei tarvitse ratkaista mitään juuri nyt.",
      "Ota seuraava pieni hengitys.",
      "Keskity vain tähän hetkeen.",
      "Hyvä. Jatka rauhallisesti."
    ];

    let messages = [...defaultMessages];
    let index = 0;
    let isTransitioning = false;

    const message = document.getElementById("message");
    const button = document.getElementById("nextButton");
    const prevButton = document.getElementById("prevButton");
    const ambientElements = document.querySelectorAll(".ambient");
    const dotsContainer = document.getElementById("progressDots");
    const menuButton = document.getElementById("menuButton");
    const dayThemeButton = document.getElementById("dayThemeButton");
    const nightThemeButton = document.getElementById("nightThemeButton");
    const infoOverlay = document.getElementById("infoOverlay");
    const textEditToggle = document.getElementById("textEditToggle");
    const textEditor = document.getElementById("textEditor");
    const textFields = document.getElementById("textFields");
    const textSaveStatus = document.getElementById("textSaveStatus");
    const addTextButton = document.getElementById("addTextButton");
    const saveTextsButton = document.getElementById("saveTextsButton");
    const resetTextsButton = document.getElementById("resetTextsButton");
    const storageKeys = {
      messages: "valwen-messages",
      legacyMessages: "rauhatap-messages",
      theme: "valwen-theme",
      legacyTheme: "rauhatap-theme"
    };
    const themeColors = {
      day: "#365e64",
      night: "#172f3a"
    };
    const themeMeta = document.querySelector('meta[name="theme-color"]');

    const loadSavedMessages = () => {
      try {
        const storedMessages = localStorage.getItem(storageKeys.messages) || localStorage.getItem(storageKeys.legacyMessages);
        const savedMessages = JSON.parse(storedMessages || "null");
        if (Array.isArray(savedMessages) && savedMessages.some((text) => String(text).trim())) {
          messages = savedMessages.map((text) => String(text).trim()).filter(Boolean);
          localStorage.setItem(storageKeys.messages, JSON.stringify(messages));
        }
      } catch (error) {
        messages = [...defaultMessages];
      }
    };

    const renderTextFields = () => {
      textFields.innerHTML = "";

      messages.forEach((text, textIndex) => {
        const row = document.createElement("div");
        row.className = "textFieldRow";

        const field = document.createElement("textarea");
        field.className = "textField";
        field.value = text;
        field.rows = 2;
        field.setAttribute("aria-label", `Kortti ${textIndex + 1}`);

        const deleteButton = document.createElement("button");
        deleteButton.className = "deleteTextButton";
        deleteButton.type = "button";
        deleteButton.textContent = "×";
        deleteButton.disabled = messages.length <= 1;
        deleteButton.setAttribute("aria-label", `Poista kortti ${textIndex + 1}`);
        deleteButton.addEventListener("click", () => {
          if (messages.length <= 1) {
            return;
          }

          messages = Array.from(textFields.querySelectorAll(".textField"))
            .map((field) => field.value);
          messages.splice(textIndex, 1);
          index = Math.min(index, messages.length - 1);
          renderTextFields();
          updateProgress();
          refreshCurrentCard();
        });

        row.appendChild(field);
        row.appendChild(deleteButton);
        textFields.appendChild(row);
      });
    };

    const setTheme = (theme) => {
      document.documentElement.dataset.theme = theme;
      document.body.dataset.theme = theme;
      localStorage.setItem(storageKeys.theme, theme);
      if (themeMeta) {
        themeMeta.setAttribute("content", themeColors[theme] || themeColors.night);
      }
      dayThemeButton.classList.toggle("active", theme === "day");
      nightThemeButton.classList.toggle("active", theme === "night");
      dayThemeButton.setAttribute("aria-pressed", String(theme === "day"));
      nightThemeButton.setAttribute("aria-pressed", String(theme === "night"));
    };

    const savedTheme = localStorage.getItem(storageKeys.theme) || localStorage.getItem(storageKeys.legacyTheme);
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    setTheme(savedTheme || (prefersDark ? "night" : "day"));

    loadSavedMessages();
    message.textContent = messages[index];

    const updateProgress = () => {
      dotsContainer.innerHTML = "";
      messages.forEach((_, dotIndex) => {
        const dot = document.createElement("span");
        dot.className = dotIndex === index ? "progressDot active" : "progressDot";
        dotsContainer.appendChild(dot);
      });
      document.body.classList.toggle("finalCard", index === messages.length - 1);
    };

    updateProgress();
    renderTextFields();

    const refreshCurrentCard = () => {
      index = Math.min(index, messages.length - 1);
      message.textContent = messages[index] || "";
      dotsContainer.querySelectorAll(".progressDot").forEach((dot, dotIndex) => {
        dot.classList.toggle("active", dotIndex === index);
      });
    };

    const closeInfo = () => {
      infoOverlay.classList.remove("open");
      infoOverlay.setAttribute("aria-hidden", "true");
      menuButton.setAttribute("aria-expanded", "false");
    };

    menuButton.addEventListener("click", () => {
      const isOpen = infoOverlay.classList.toggle("open");
      infoOverlay.setAttribute("aria-hidden", String(!isOpen));
      menuButton.setAttribute("aria-expanded", String(isOpen));
    });

    dayThemeButton.addEventListener("click", () => setTheme("day"));
    nightThemeButton.addEventListener("click", () => setTheme("night"));

    textEditToggle.addEventListener("click", () => {
      const isOpen = textEditor.classList.toggle("open");
      textEditToggle.setAttribute("aria-expanded", String(isOpen));
      if (isOpen) {
        textSaveStatus.classList.remove("visible");
        textSaveStatus.setAttribute("aria-hidden", "true");
      }
    });

    addTextButton.addEventListener("click", () => {
      messages = Array.from(textFields.querySelectorAll(".textField"))
        .map((field) => field.value);
      messages.push("");
      renderTextFields();
      updateProgress();

      const fields = textFields.querySelectorAll(".textField");
      const newField = fields[fields.length - 1];
      if (newField) {
        newField.focus();
      }
    });

    saveTextsButton.addEventListener("click", () => {
      const editedMessages = Array.from(textFields.querySelectorAll(".textField"))
        .map((field) => field.value.trim())
        .filter(Boolean);

      if (!editedMessages.length) {
        return;
      }

      messages = editedMessages;
      localStorage.setItem(storageKeys.messages, JSON.stringify(messages));
      renderTextFields();
      updateProgress();
      refreshCurrentCard();
      textEditor.classList.remove("open");
      textEditToggle.setAttribute("aria-expanded", "false");
      textSaveStatus.classList.add("visible");
      textSaveStatus.setAttribute("aria-hidden", "false");
    });

    resetTextsButton.addEventListener("click", () => {
      const shouldReset = window.confirm("Haluatko varmasti palauttaa alkuperäiset ohjeet? Omat tekstisi poistuvat tältä laitteelta.");

      if (!shouldReset) {
        return;
      }

      messages = [...defaultMessages];
      index = 0;
      localStorage.removeItem(storageKeys.messages);
      localStorage.removeItem(storageKeys.legacyMessages);
      renderTextFields();
      updateProgress();
      refreshCurrentCard();
    });

    infoOverlay.addEventListener("click", (event) => {
      if (event.target === infoOverlay) {
        closeInfo();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeInfo();
      }
    });

    const preventViewportZoom = (event) => {
      event.preventDefault();
    };

    const preventMultiTouchPan = (event) => {
      if (event.touches && event.touches.length > 1) {
        event.preventDefault();
      }
    };

    document.addEventListener("gesturestart", preventViewportZoom, { passive: false });
    document.addEventListener("gesturechange", preventViewportZoom, { passive: false });
    document.addEventListener("gestureend", preventViewportZoom, { passive: false });
    document.addEventListener("touchmove", preventMultiTouchPan, { passive: false });

    const changeCard = (direction) => {
      if (isTransitioning) {
        return;
      }

      isTransitioning = true;
      button.disabled = true;
      prevButton.disabled = true;
      message.classList.remove("fadeIn");
      message.classList.add("fadeOut");

      setTimeout(() => {
        index = (index + direction + messages.length) % messages.length;
        message.textContent = messages[index];
        updateProgress();

        message.classList.remove("fadeOut");

        requestAnimationFrame(() => {
          message.classList.add("fadeIn");
        });
      }, 170);

      setTimeout(() => {
        isTransitioning = false;
        button.disabled = false;
        prevButton.disabled = false;
      }, 440);
    };

    button.addEventListener("click", () => {
      if (!prefersLeanMotion) {
        document.body.classList.remove("pulse");
        button.classList.remove("ripple");

        document.body.classList.add("pulse");
        button.classList.add("ripple");

        setTimeout(() => {
          document.body.classList.remove("pulse");
          button.classList.remove("ripple");
        }, 1800);
      }

      if ("vibrate" in navigator) {
        navigator.vibrate(20);
      }

      changeCard(1);
    });

    prevButton.addEventListener("click", () => {
      if (!prefersLeanMotion) {
        prevButton.classList.remove("ripple");

        prevButton.classList.add("ripple");

        setTimeout(() => {
          prevButton.classList.remove("ripple");
        }, 1100);
      }

      if ("vibrate" in navigator) {
        navigator.vibrate(12);
      }

      changeCard(-1);
    });

    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const prefersLeanMotion = window.matchMedia("(max-width: 760px), (pointer: coarse)").matches;
    const flowCanvas = document.getElementById("flowCanvas");
    const flowContext = flowCanvas.getContext("2d");
    const pointerTarget = { x: 0, y: 0 };
    const pointerCurrent = { x: 0, y: 0 };
    let sandReturnTimer;
    const sandStartedAt = performance.now();
    const canvasBleedTop = 180;
    const canvasBleedBottom = 520;
    let canvasWidth = 0;
    let canvasHeight = 0;
    let canvasScale = 1;
    let lastSandFrame = 0;
    const sandFrameInterval = prefersLeanMotion ? 1000 / 30 : 0;

    const particles = Array.from({ length: prefersLeanMotion ? 720 : 3200 }, (_, particleIndex) => ({
      angle: (particleIndex * 2.39996) % (Math.PI * 2),
      ring: particleIndex % 8,
      offset: Math.sin(particleIndex * 12.9898) * 18,
      speed: 0.035 + (particleIndex % 13) * 0.0018,
      size: 0.32 + (particleIndex % 9) * 0.1,
      alpha: 0.14 + (particleIndex % 11) * 0.017,
      phase: Math.sin(particleIndex * 4.173) * Math.PI,
      bright: particleIndex % 6 === 0
    }));

    const backgroundGrain = Array.from({ length: prefersLeanMotion ? 1100 : 9600 }, (_, grainIndex) => ({
      x: ((grainIndex * 0.61803398875) % 1),
      y: ((grainIndex * 0.754877666) % 1),
      size: 0.34 + (grainIndex % 7) * 0.115,
      alpha: 0.04 + (grainIndex % 9) * 0.009,
      phase: grainIndex * 0.137,
      dark: grainIndex % 4 === 0
    }));

    const resizeFlowCanvas = () => {
      canvasScale = prefersLeanMotion ? 1 : Math.min(window.devicePixelRatio || 1, 1.5);
      canvasWidth = window.innerWidth;
      canvasHeight = window.innerHeight + canvasBleedTop + canvasBleedBottom;
      flowCanvas.width = Math.round(canvasWidth * canvasScale);
      flowCanvas.height = Math.round(canvasHeight * canvasScale);
      flowContext.setTransform(canvasScale, 0, 0, canvasScale, 0, 0);
    };

    resizeFlowCanvas();
    window.addEventListener("resize", resizeFlowCanvas);

    window.addEventListener("pointermove", (event) => {
      clearTimeout(sandReturnTimer);
      pointerTarget.x = (event.clientX / window.innerWidth - 0.5) * 0.28;
      pointerTarget.y = (event.clientY / window.innerHeight - 0.5) * 0.28;

      sandReturnTimer = setTimeout(() => {
        pointerTarget.x = 0;
        pointerTarget.y = 0;
      }, 700);
    });

    window.addEventListener("pointerleave", () => {
      pointerTarget.x = 0;
      pointerTarget.y = 0;
    });

    const drawFlow = (elapsed) => {
      const minSide = Math.min(canvasWidth, canvasHeight);
      const maxRadius = Math.max(canvasWidth, canvasHeight) * 0.58;
      const centerX = canvasWidth * 0.5 + pointerCurrent.x * 11;
      const visualCenterY = window.innerHeight * (canvasWidth <= 520 ? 0.43 : 0.5);
      const centerY = canvasBleedTop + visualCenterY + pointerCurrent.y * 9;
      const isNight = document.body.dataset.theme === "night";
      const ringColor = isNight ? "190,242,226" : "232,249,244";
      const grainColor = isNight ? "174,237,220" : "232,250,244";
      const auraColors = isNight
        ? [
            [95, 238, 218, 0.42],
            [180, 224, 108, 0.28],
            [90, 152, 238, 0.28],
            [244, 214, 142, 0.2],
            [126, 224, 182, 0.24]
          ]
        : [
            [238, 252, 247, 0.34],
            [189, 229, 218, 0.28],
            [126, 181, 198, 0.22],
            [246, 242, 220, 0.08],
            [164, 214, 197, 0.2]
          ];
      const activeAuraColors = prefersLeanMotion
        ? auraColors.slice(0, 3).map((color) => [color[0], color[1], color[2], color[3] * 0.72])
        : auraColors;

      flowContext.clearRect(0, 0, canvasWidth, canvasHeight);
      flowContext.lineCap = "round";
      flowContext.save();
      flowContext.globalCompositeOperation = prefersLeanMotion ? "source-over" : "lighter";

      activeAuraColors.forEach((color, colorIndex) => {
        const phase = elapsed * (0.085 + colorIndex * 0.014) + colorIndex * 1.66;
        const wideSide = Math.max(canvasWidth, canvasHeight);
        const orbitX =
          Math.sin(phase) * minSide * (0.2 + colorIndex * 0.026) +
          Math.sin(phase * 0.37 + colorIndex) * wideSide * 0.035;
        const orbitY =
          Math.cos(phase * 0.73 + colorIndex) * minSide * (0.15 + colorIndex * 0.018) +
          Math.sin(phase * 0.52 - colorIndex) * minSide * 0.04;
        const wobble = Math.sin(elapsed * 0.11 + colorIndex * 2.1) * minSide * 0.035;
        const x = centerX + orbitX + pointerCurrent.x * minSide * 0.3;
        const y = centerY + orbitY + pointerCurrent.y * minSide * 0.26;
        const radius = minSide * (0.46 + colorIndex * 0.045) + wobble;
        const softLayers = prefersLeanMotion
          ? [
              [0, 0, 1.2, 0.9, 0.42],
              [
                Math.sin(phase * 1.4) * radius * 0.08,
                Math.cos(phase * 1.1) * radius * 0.06,
                0.9,
                0.66,
                0.24
              ]
            ]
          : [
              [0, 0, 1.34, 0.92, 0.5],
              [
                Math.sin(phase * 1.4) * radius * 0.12,
                Math.cos(phase * 1.1) * radius * 0.08,
                1.02,
                0.72,
                0.34
              ],
              [
                Math.cos(phase * 0.9) * radius * 0.16,
                Math.sin(phase * 1.2) * radius * 0.11,
                0.76,
                0.58,
                0.22
              ]
            ];

        flowContext.filter = prefersLeanMotion
          ? "none"
          : `blur(${Math.max(18, minSide * 0.035).toFixed(1)}px)`;

        softLayers.forEach((layer, layerIndex) => {
          const layerX = x + layer[0];
          const layerY = y + layer[1];
          const layerRadius = radius * (1.08 + layerIndex * 0.14);
          const layerAlpha = color[3] * layer[4];
          const gradient = flowContext.createRadialGradient(layerX, layerY, 0, layerX, layerY, layerRadius);

          gradient.addColorStop(0, `rgba(${color[0]},${color[1]},${color[2]},${layerAlpha})`);
          gradient.addColorStop(0.26, `rgba(${color[0]},${color[1]},${color[2]},${layerAlpha * 0.58})`);
          gradient.addColorStop(0.58, `rgba(${color[0]},${color[1]},${color[2]},${layerAlpha * 0.22})`);
          gradient.addColorStop(0.86, `rgba(${color[0]},${color[1]},${color[2]},${layerAlpha * 0.055})`);
          gradient.addColorStop(1, `rgba(${color[0]},${color[1]},${color[2]},0)`);

          flowContext.fillStyle = gradient;
          flowContext.beginPath();
          flowContext.ellipse(
            layerX,
            layerY,
            layerRadius * layer[2] * (1.16 + Math.sin(phase * 0.7 + layerIndex) * 0.12),
            layerRadius * layer[3] * (0.92 + Math.cos(phase * 0.9 + layerIndex) * 0.11),
            phase * (0.3 + layerIndex * 0.08),
            0,
            Math.PI * 2
          );
          flowContext.fill();
        });
      });

      flowContext.filter = "none";
      flowContext.restore();

      const ringCount = prefersLeanMotion ? 4 : 8;
      const ringPoints = prefersLeanMotion ? 48 : 96;

      for (let ringIndex = 0; ringIndex < ringCount; ringIndex += 1) {
        const progress = ((elapsed * 0.018 + ringIndex / ringCount) % 1);
        const radius = minSide * 0.12 + progress * maxRadius;
        const fade = Math.sin(progress * Math.PI) * 0.012;
        const driftX = Math.sin(elapsed * 0.12 + ringIndex * 1.7) * 4;
        const driftY = Math.cos(elapsed * 0.1 + ringIndex * 1.3) * 3;

        flowContext.beginPath();
        for (let point = 0; point <= ringPoints; point += 1) {
          const angle = point / ringPoints * Math.PI * 2;
          const ripple =
            Math.sin(angle * 3 + elapsed * 0.17 + ringIndex) * 2.2 +
            Math.sin(angle * 5 - elapsed * 0.11 + ringIndex * 0.7) * 1.2;
          const x = centerX + driftX + Math.cos(angle) * (radius + ripple);
          const y = centerY + driftY + Math.sin(angle) * (radius * 0.985 + ripple);
          if (point === 0) flowContext.moveTo(x, y);
          else flowContext.lineTo(x, y);
        }
        flowContext.closePath();
        flowContext.strokeStyle = `rgba(${ringColor},${fade.toFixed(3)})`;
        flowContext.lineWidth = 0.45;
        flowContext.stroke();
      }

      particles.forEach((particle, particleIndex) => {
        const progress = ((elapsed * 0.018 + particle.ring / 8) % 1);
        const radius = minSide * 0.12 + progress * maxRadius + particle.offset;
        const angle = particle.angle + elapsed * particle.speed;
        const flow = Math.sin(angle * 4 + elapsed * 0.16 + particleIndex) * 3;
        const x = centerX + Math.cos(angle) * (radius + flow);
        const y = centerY + Math.sin(angle) * (radius * 0.985 + flow);
        const fade = Math.sin(progress * Math.PI);
        const lightBand =
          0.08 +
          Math.pow(
            Math.max(0, Math.sin(angle * 2.1 - elapsed * 0.24 + particle.ring * 0.72 + particle.phase)),
            1.7
          ) * 1.15;
        const softFlow =
          0.42 +
          Math.max(0, Math.sin(angle * 0.72 + elapsed * 0.11 - particle.ring * 0.48)) * 0.58;
        const grainAlpha = particle.alpha * fade * lightBand * softFlow * (particle.bright ? 1.35 : 0.9);
        const grainSize = particle.size * (0.72 + lightBand * (particle.bright ? 0.9 : 0.48));

        flowContext.beginPath();
        flowContext.arc(x, y, grainSize, 0, Math.PI * 2);
        flowContext.fillStyle = `rgba(${grainColor},${grainAlpha.toFixed(3)})`;
        flowContext.fill();
      });

      flowContext.globalCompositeOperation = "destination-in";
      const mask = flowContext.createRadialGradient(
        centerX,
        centerY,
        minSide * 0.12,
        centerX,
        centerY,
        maxRadius * 1.34
      );
      mask.addColorStop(0, "rgba(0,0,0,1)");
      mask.addColorStop(0.5, "rgba(0,0,0,0.95)");
      mask.addColorStop(0.74, "rgba(0,0,0,0.58)");
      mask.addColorStop(0.9, "rgba(0,0,0,0.18)");
      mask.addColorStop(1, "rgba(0,0,0,0)");
      flowContext.fillStyle = mask;
      flowContext.fillRect(0, 0, canvasWidth, canvasHeight);
      flowContext.globalCompositeOperation = "source-over";

      backgroundGrain.forEach((grain) => {
        const driftX = Math.sin(elapsed * 0.1 + grain.phase) * 2.8;
        const driftY = Math.cos(elapsed * 0.08 + grain.phase * 0.7) * 2.4;
        const shimmer = 0.72 + Math.sin(elapsed * 0.16 + grain.phase) * 0.32;
        const x = grain.x * canvasWidth + driftX;
        const y = grain.y * canvasHeight + driftY;

        flowContext.beginPath();
        flowContext.arc(x, y, grain.size, 0, Math.PI * 2);
        flowContext.fillStyle = grain.dark
          ? `rgba(20,34,36,${(grain.alpha * shimmer * 1.08).toFixed(3)})`
          : `rgba(${grainColor},${(grain.alpha * shimmer * 1.42).toFixed(3)})`;
        flowContext.fill();
      });
    };

    const animateSand = (time) => {
      if (sandFrameInterval && time - lastSandFrame < sandFrameInterval) {
        requestAnimationFrame(animateSand);
        return;
      }

      lastSandFrame = time;
      const elapsed = (time - sandStartedAt) / 1000;
      const ease = 0.018;

      pointerCurrent.x += (pointerTarget.x - pointerCurrent.x) * ease;
      pointerCurrent.y += (pointerTarget.y - pointerCurrent.y) * ease;

      drawFlow(elapsed);

      ambientElements.forEach((el, i) => {
        const strength = (i + 1) * 0.22;
        el.style.setProperty("--move-x", `${(pointerCurrent.x * 12 * strength).toFixed(2)}px`);
        el.style.setProperty("--move-y", `${(pointerCurrent.y * 12 * strength).toFixed(2)}px`);
      });

      requestAnimationFrame(animateSand);
    };

    if (!prefersReducedMotion) {
      requestAnimationFrame(animateSand);
    } else {
      drawFlow(0);
    }

    if ("serviceWorker" in navigator) {
      let refreshingForUpdate = false;

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshingForUpdate) {
          return;
        }

        refreshingForUpdate = true;
        window.location.reload();
      });

      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then((registration) => {
            registration.update();

            if (registration.waiting) {
              registration.waiting.postMessage({ type: "SKIP_WAITING" });
            }

            registration.addEventListener("updatefound", () => {
              const nextWorker = registration.installing;

              if (!nextWorker) {
                return;
              }

              nextWorker.addEventListener("statechange", () => {
                if (nextWorker.state === "installed" && navigator.serviceWorker.controller) {
                  nextWorker.postMessage({ type: "SKIP_WAITING" });
                }
              });
            });
          })
          .catch(() => {});
      });
    }
  </script>
</body>
</html>
