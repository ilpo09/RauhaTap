  <style>
    html, body { margin: 0; padding: 0; width: 100%; min-height: 100%; overflow: hidden; background: #17364a; }
    body {
      min-height: 100dvh; font-family: Inter, ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif; color: white;

    .ambient { position: fixed; border-radius: 999px; filter: blur(90px); opacity: var(--ambient-opacity, 0.22); pointer-events: none; mix-blend-mode: screen; z-index: 0; transform: translate(var(--move-x, 0px), var(--move-y, 0px)); }

    .app { position: relative; width: min(90vw, 480px); min-height: 100dvh; padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom); text-align: center; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; }
    .cardFilmGlow { position: absolute; top: 50%; left: 50%; width: min(150vw, 760px); height: min(116vw, 590px); max-height: 72vh; pointer-events: none; transform: translate(-50%, -57%); opacity: 0.56; mix-blend-mode: soft-light; background: url("data:image/svg+xml,%3Csvg width='360' height='360' viewBox='0 0 360 360' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='film'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='4' seed='19' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='360' height='360' filter='url(%23film)' opacity='0.72'/%3E%3C/svg%3E"), radial-gradient(ellipse at center, rgba(247,250,222,0.28), rgba(178,221,205,0.12) 42%, transparent 72%); background-size: 360px 360px, 100% 100%; -webkit-mask-image: radial-gradient(ellipse at center, black 0 30%, rgba(0,0,0,0.76) 48%, transparent 75%); mask-image: radial-gradient(ellipse at center, black 0 30%, rgba(0,0,0,0.76) 48%, transparent 75%); animation: filmGrainFlicker 780ms steps(2,end) infinite; z-index: 0; }

    .menuButton span { width: 3px; height: 17px; border-radius: 999px; background: rgba(255,255,255,.78); }
    .brandLogo { position: fixed; top: max(18px,env(safe-area-inset-top)); left: 74px; height: 46px; z-index: 5; display: flex; align-items: center; gap: 3px; font-size: 1.55rem; font-weight: 720; line-height: 1; pointer-events: none; }
    .brandMark { width: 46px; height: 46px; display: block; }
    .card { position: relative; width: 100%; height: 320px; padding: 42px; border-radius: 38px; background: linear-gradient(145deg,rgba(255,255,255,.18),rgba(255,255,255,.09)),rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.24); display: flex; align-items: center; justify-content: center; box-sizing: border-box; overflow: hidden; backdrop-filter: blur(30px) saturate(1.12); box-shadow: 0 28px 76px rgba(0,0,0,.22),inset 0 1px 1px rgba(255,255,255,.18),inset 0 -32px 70px rgba(18,56,70,.12); animation: breathe 14s ease-in-out infinite,floatCard 20s ease-in-out infinite alternate; }
    .card::before { content:""; position:absolute; inset:18px; border-radius:30px; border:1px solid rgba(255,255,255,.12); box-shadow:0 0 52px rgba(185,245,236,.1),inset 0 0 42px rgba(255,255,255,.06); pointer-events:none; animation:breatheHalo 7s ease-in-out infinite; }
    .card::after { content:""; position:absolute; top:-38%; left:-54%; width:58%; height:176%; background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent); transform:rotate(18deg); pointer-events:none; animation:glassShimmer 11s ease-in-out infinite; }
    #message { margin:0; color:white!important; -webkit-text-fill-color:white; opacity:1!important; font-size:clamp(1.9rem,7vw,2.55rem); font-weight:650; line-height:1.35; display:flex; align-items:center; justify-content:center; width:100%; height:100%; text-align:center; transition:opacity .45s ease,transform .45s ease; text-wrap:balance; text-shadow:0 2px 24px rgba(0,0,0,.16); z-index:1; }
    .fadeOut { opacity:0!important; transform:translateY(6px); } .fadeIn { opacity:1!important; transform:translateY(0); }

    .arrowButton::before,.arrowButton::after { content:""; position:absolute; inset:-10px; border-radius:999px; border:1px solid rgba(220,255,248,.2); pointer-events:none; animation:arrowBreath 4.8s ease-in-out infinite; } .arrowButton::after { inset:-22px; opacity:0; animation-delay:1.2s; }
    .progressDots { display:flex; align-items:center; justify-content:center; gap:8px; height:18px; margin-top:22px; } .progressDot { width:5px; height:5px; border-radius:999px; background:rgba(255,255,255,.28); transition:width .35s ease,background .35s ease; } .progressDot.active { width:18px; background:rgba(255,255,255,.82); }
    .infoOverlay { position:fixed; inset:0; display:flex; align-items:flex-start; padding:calc(max(18px,env(safe-area-inset-top)) + 58px) 18px 18px; box-sizing:border-box; opacity:0; pointer-events:none; z-index:4; transition:opacity .22s ease,background .22s ease; } .infoOverlay.open { opacity:1; pointer-events:auto; background:rgba(10,30,40,.18); }
    .infoPanel { width:min(82vw,320px); padding:20px; border-radius:24px; border:1px solid rgba(255,255,255,.22); background:rgba(255,255,255,.13); color:rgba(255,255,255,.92); text-align:left; line-height:1.45; font-size:.98rem; font-weight:500; backdrop-filter:blur(24px); box-shadow:0 22px 60px rgba(0,0,0,.2); transform:translateY(-8px); transition:transform .22s ease; } .infoOverlay.open .infoPanel { transform:translateY(0); }
    .themeSwitch { width:100%; height:48px; margin-top:18px; padding:4px; border:1px solid rgba(255,255,255,.16); border-radius:999px; background:rgba(255,255,255,.08); display:grid; grid-template-columns:1fr 1fr; gap:4px; box-sizing:border-box; } .themeOption { border:0; border-radius:999px; background:transparent; color:rgba(255,255,255,.72); display:flex; align-items:center; justify-content:center; gap:8px; font:inherit; font-weight:700; cursor:pointer; } .themeOption.active { background:rgba(255,255,255,.18); color:white; } .themeOption svg { width:18px; height:18px; }
    @keyframes calmBackground { from{background-size:138% 138%,100% 100%,100% 100%} to{background-size:146% 146%,100% 100%,100% 100%} }
    @keyframes filmGrainFlicker { 0%{background-position:0 0,center;filter:contrast(1.02)} 25%{background-position:9px -6px,center;filter:contrast(1.08)} 50%{background-position:-7px 8px,center;filter:contrast(1.04)} 75%{background-position:5px 4px,center;filter:contrast(1.1)} 100%{background-position:-4px -7px,center;filter:contrast(1.03)} }
    @keyframes breathe { 0%{transform:scale(.98)} 35%{transform:scale(1.03)} 100%{transform:scale(.98)} } @keyframes breatheHalo { 0%,100%{opacity:.34;transform:scale(.98)} 50%{opacity:.74;transform:scale(1.015)} } @keyframes floatCard { from{transform:translateY(0) scale(.98)} to{transform:translateY(-10px) scale(1.03)} } @keyframes floatArrow { from{translate:0 0} to{translate:0 -4px} } @keyframes arrowBreath { 0%,100%{opacity:.18;transform:scale(.96)} 50%{opacity:.34;transform:scale(1.06)} } @keyframes glassShimmer { 0%,64%{opacity:0;transform:translateX(0) rotate(18deg)} 76%{opacity:.75} 100%{opacity:0;transform:translateX(340%) rotate(18deg)} } @keyframes floatOne { from{translate:0 0;scale:1} to{translate:60px 90px;scale:1.18} } @keyframes floatTwo { from{translate:0 0;scale:1} to{translate:-70px -60px;scale:1.12} } @keyframes pulseGlow { 0%,100%{transform:translate(-50%,-50%) scale(.92);opacity:.05} 50%{transform:translate(-50%,-50%) scale(1.08);opacity:.12} }
    body.pulse .ambient1{animation:floatOne 26s ease-in-out infinite alternate} body.pulse .ambient2{animation:floatTwo 32s ease-in-out infinite alternate} body.pulse .ambient3{animation:pulseGlow 18s ease-in-out infinite}

    @media(max-width:420px){.app{width:min(91vw,480px);padding-left:18px;padding-right:18px}.card{height:300px;padding:34px 28px;border-radius:32px}#message{font-size:clamp(1.7rem,8vw,2.28rem)}.brandLogo{left:72px;font-size:1.42rem}}

<body>
  <canvas id="flowCanvas" class="flowCanvas" aria-hidden="true"></canvas>
  <div class="ambient ambient1"></div><div class="ambient ambient2"></div><div class="ambient ambient3"></div>
  <button id="menuButton" class="menuButton" aria-label="Lisätiedot" aria-expanded="false" aria-controls="infoOverlay"><span></span><span></span><span></span></button>
  <div class="brandLogo" aria-label="RauhaTap"><img class="brandMark" src="rauhatap-circle-three-waves-small-cutout.svg" alt=""><span>RauhaTap</span></div>
  <div id="infoOverlay" class="infoOverlay" aria-hidden="true"><div class="infoPanel" role="dialog" aria-label="Aloitusnäytölle tallentaminen">Voit tallentaa tämän aloitusnäytölle, jotta Apukortti on nopeasti saatavilla myös ilman nettiä.<div class="themeSwitch" aria-label="Väriteema"><button id="dayThemeButton" class="themeOption" type="button"><svg viewBox="0 0 24 24" fill="none"><path d="M12 4V2M12 22V20M20 12H22M2 12H4M18.36 5.64L19.78 4.22M4.22 19.78L5.64 18.36M18.36 18.36L19.78 19.78M4.22 4.22L5.64 5.64M12 17A5 5 0 1 0 12 7A5 5 0 0 0 12 17Z" stroke="currentColor" stroke-width="1.8"/></svg>Päivä</button><button id="nightThemeButton" class="themeOption" type="button"><svg viewBox="0 0 24 24" fill="none"><path d="M21 14.8A8.5 8.5 0 0 1 9.2 3A7.2 7.2 0 1 0 21 14.8Z" stroke="currentColor" stroke-width="1.8"/></svg>Yö</button></div></div></div>
  <main class="app"><div class="cardFilmGlow" aria-hidden="true"></div><section class="card"><p id="message">Tämä on paniikkikohtaus. Se menee ohi.</p></section><button id="nextButton" class="arrowButton" aria-label="Seuraava teksti">→</button><div id="progressDots" class="progressDots"></div></main>
  <script>
    const messages=["Tämä on paniikkikohtaus. Se menee ohi.","Olet turvassa juuri nyt.","Hengitä rauhassa sisään.","Puhalla hitaasti ulos.","Katso ympärillesi ja nimeä yksi asia, jonka näet.","Tunne jalkasi lattiaa vasten.","Tämä tunne menee ohi.","Sinun ei tarvitse ratkaista mitään juuri nyt.","Ota seuraava pieni hengitys.","Keskity vain tähän hetkeen.","Hyvä. Jatka rauhallisesti."];
    let index=0; const message=document.getElementById("message"),button=document.getElementById("nextButton"),ambientElements=document.querySelectorAll(".ambient"),dotsContainer=document.getElementById("progressDots"),menuButton=document.getElementById("menuButton"),dayThemeButton=document.getElementById("dayThemeButton"),nightThemeButton=document.getElementById("nightThemeButton"),infoOverlay=document.getElementById("infoOverlay");
    const setTheme=theme=>{document.body.dataset.theme=theme;localStorage.setItem("rauhatap-theme",theme);dayThemeButton.classList.toggle("active",theme==="day");nightThemeButton.classList.toggle("active",theme==="night")}; setTheme(localStorage.getItem("rauhatap-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"night":"day"));
    messages.forEach((_,i)=>{const dot=document.createElement("span");dot.className=i===index?"progressDot active":"progressDot";dotsContainer.appendChild(dot)}); const updateProgress=()=>dotsContainer.querySelectorAll(".progressDot").forEach((dot,i)=>dot.classList.toggle("active",i===index));
    menuButton.onclick=()=>{const open=infoOverlay.classList.toggle("open");infoOverlay.setAttribute("aria-hidden",String(!open))}; infoOverlay.onclick=e=>{if(e.target===infoOverlay)infoOverlay.classList.remove("open")}; dayThemeButton.onclick=()=>setTheme("day");nightThemeButton.onclick=()=>setTheme("night");
    button.onclick=()=>{document.body.classList.add("pulse");setTimeout(()=>document.body.classList.remove("pulse"),1200);if("vibrate"in navigator)navigator.vibrate(20);message.classList.add("fadeOut");setTimeout(()=>{index=(index+1)%messages.length;message.textContent=messages[index];updateProgress();message.classList.remove("fadeOut");message.classList.add("fadeIn")},280)};
    const reduced=matchMedia("(prefers-reduced-motion: reduce)").matches,canvas=document.getElementById("flowCanvas"),ctx=canvas.getContext("2d"),pointerTarget={x:0,y:0},pointerCurrent={x:0,y:0},started=performance.now();let w=0,h=0,scale=1,timer;
    const particles=Array.from({length:3200},(_,i)=>({angle:(i*2.39996)%(Math.PI*2),ring:i%8,offset:Math.sin(i*12.9898)*18,speed:.035+(i%13)*.0018,size:.32+(i%9)*.1,alpha:.14+(i%11)*.017,phase:Math.sin(i*4.173)*Math.PI,bright:i%6===0}));
    const backgroundGrain=Array.from({length:3800},(_,i)=>({x:(i*.61803398875)%1,y:(i*.754877666)%1,size:.26+(i%7)*.09,alpha:.022+(i%9)*.006,phase:i*.137,dark:i%4===0}));
    const resize=()=>{scale=Math.min(devicePixelRatio||1,1.5);w=innerWidth;h=innerHeight;canvas.width=Math.round(w*scale);canvas.height=Math.round(h*scale);ctx.setTransform(scale,0,0,scale,0,0)};resize();addEventListener("resize",resize);addEventListener("pointermove",e=>{clearTimeout(timer);pointerTarget.x=(e.clientX/innerWidth-.5)*.28;pointerTarget.y=(e.clientY/innerHeight-.5)*.28;timer=setTimeout(()=>{pointerTarget.x=0;pointerTarget.y=0},700)});
    const draw=t=>{const min=Math.min(w,h),max=Math.max(w,h)*.58,cx=w*.5+pointerCurrent.x*11,cy=h*.5+pointerCurrent.y*9,night=document.body.dataset.theme==="night",ring=night?"190,242,226":"245,246,218",grain=night?"174,237,220":"255,249,220";ctx.clearRect(0,0,w,h);ctx.lineCap="round";for(let r=0;r<8;r++){const p=(t*.018+r/8)%1,rad=min*.12+p*max,fade=Math.sin(p*Math.PI)*.012,dx=Math.sin(t*.12+r*1.7)*4,dy=Math.cos(t*.1+r*1.3)*3;ctx.beginPath();for(let n=0;n<=96;n++){const a=n/96*Math.PI*2,rip=Math.sin(a*3+t*.17+r)*2.2+Math.sin(a*5-t*.11+r*.7)*1.2,x=cx+dx+Math.cos(a)*(rad+rip),y=cy+dy+Math.sin(a)*(rad*.985+rip);n?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.closePath();ctx.strokeStyle=`rgba(${ring},${fade})`;ctx.lineWidth=.45;ctx.stroke()}
    particles.forEach((q,i)=>{const p=(t*.018+q.ring/8)%1,rad=min*.12+p*max+q.offset,a=q.angle+t*q.speed,flow=Math.sin(a*4+t*.16+i)*3,x=cx+Math.cos(a)*(rad+flow),y=cy+Math.sin(a)*(rad*.985+flow),fade=Math.sin(p*Math.PI),band=.08+Math.pow(Math.max(0,Math.sin(a*2.1-t*.24+q.ring*.72+q.phase)),1.7)*1.15,soft=.42+Math.max(0,Math.sin(a*.72+t*.11-q.ring*.48))*.58,alpha=q.alpha*fade*band*soft*(q.bright?1.35:.9),size=q.size*(.72+band*(q.bright?.9:.48));ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fillStyle=`rgba(${grain},${alpha})`;ctx.fill()});ctx.globalCompositeOperation="destination-in";const mask=ctx.createRadialGradient(cx,cy,min*.16,cx,cy,max*1.02);mask.addColorStop(0,"#000");mask.addColorStop(.64,"rgba(0,0,0,.82)");mask.addColorStop(1,"transparent");ctx.fillStyle=mask;ctx.fillRect(0,0,w,h);ctx.globalCompositeOperation="source-over";backgroundGrain.forEach(g=>{const x=g.x*w+Math.sin(t*.08+g.phase)*2.4,y=g.y*h+Math.cos(t*.065+g.phase*.7)*2,sh=.62+Math.sin(t*.11+g.phase)*.24;ctx.beginPath();ctx.arc(x,y,g.size,0,Math.PI*2);ctx.fillStyle=g.dark?`rgba(20,34,36,${g.alpha*sh*.82})`:`rgba(${grain},${g.alpha*sh})`;ctx.fill()})};
    const animate=time=>{const t=(time-started)/1000;pointerCurrent.x+=(pointerTarget.x-pointerCurrent.x)*.018;pointerCurrent.y+=(pointerTarget.y-pointerCurrent.y)*.018;draw(t);requestAnimationFrame(animate)};reduced?draw(0):requestAnimationFrame(animate);
  </script>
